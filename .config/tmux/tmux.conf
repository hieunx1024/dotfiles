# =============================================
# TMUX CONFIGURATION
# =============================================

# --- General Options ---
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Undercurl support for Neovim
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setqy=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%m'

# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind C-a last-window # Double-tap Ctrl-a to toggle last window

# Quality of life
set -g mouse on
set -g history-limit 50000 # Increased from 10000
set -g escape-time 0       # Remove Esc delay for Neovim/Vim
set -g allow-passthrough on
set -ga update-environment "TERM TERM_PROGRAM"

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Use Vi keys for copy mode
setw -g mode-keys vi

# Better split and window creation shortcuts (keep current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane Border & Title Customization ---
set -g pane-border-status top
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"
set -g pane-border-format " #{?pane_active,#[fg=#fabd2f]#[bold],#[fg=#7c6f64]} #P: #{pane_title} #[default] "

# --- Theme / Status Bar (Gruvbox Pill Theme) ---
set -g status-position bottom
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left-length 50
set -g status-right-length 150

# Left: Session name in a nice bubble
set -g status-left "#[fg=#282828,bg=#fabd2f,bold]  #S #[fg=#fabd2f,bg=default] "

# Right: Todo.sh, Time, Host in bubbles/pills
set -g status-right "#[fg=#fe8019]#( /home/hieunx/.config/tmux/scripts/todo.sh ) #[fg=#ebdbb2] 󱑎 %H:%M #[fg=#8ec07c]#[fg=#282828,bg=#8ec07c,bold]󰒋 #h#[fg=#8ec07c,bg=default] "

# Window status formatting (Pill design)
set -g window-status-format "#[fg=#a89984,bg=default] #I:#W "
set -g window-status-current-format "#[fg=#fabd2f,bg=#3c3836,bold]#[fg=#282828,bg=#fabd2f,bold]#I:#W*#[fg=#fabd2f,bg=#3c3836,bold]"
set -g window-status-separator " "

# Message style
set -g message-style "bg=#fabd2f,fg=#282828,bold"

# --- Copy Mode Bindings (Wayland clipboard) ---
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# --- Fast Window Navigation (without prefix) ---
# Alt-Shift-H / Alt-Shift-L to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Continuum settings
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this at the very bottom of tmux.conf)
run '/home/hieunx/.config/tmux/plugins/tpm/tpm'

# --- Keybindings ---
# Easy reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Đặt tên nhanh cho Pane bằng Prefix + T
bind T command-prompt -p "Rename pane to:" "select-pane -T '%%'"

# Resize pane bằng H, J, K, L (nhấn giữ để lặp lại)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
