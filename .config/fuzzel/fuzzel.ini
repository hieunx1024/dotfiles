[main]
font=JetBrainsMono Nerd Font:size=13
terminal=kitty
prompt=❯ 
icon-theme=Papirus
icons-enabled=yes
lines=8
width=36
horizontal-pad=16
vertical-pad=12
inner-pad=4
line-height=22
letter-spacing=0
image-size-ratio=0.5
anchor=center
x-margin=0
y-margin=0
exit-on-keyboard-focus-loss=yes
match-mode=fzf
fuzzy-min-length=1

[colors]
background=1e1e2eee
text=cdd6f4ff
match=f38ba8ff
selection=45475aff
selection-text=cdd6f4ff
selection-match=f38ba8ff
border=89b4faff

[border]
width=2
radius=12
