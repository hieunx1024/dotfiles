[main]
font=JetBrainsMono Nerd Font:size=13
terminal=kitty
prompt=❯ 
icon-theme=Papirus
icons-enabled=yes
lines=8
width=36
horizontal-pad=16
vertical-pad=12
inner-pad=4
line-height=22
letter-spacing=0
image-size-ratio=0.5
anchor=center
x-margin=0
y-margin=0
exit-on-keyboard-focus-loss=yes
match-mode=fzf
fuzzy-min-length=1

[colors]
background=1d2021ee
text=ebdbb2ff
match=fe8019ff
selection=3c3836ff
selection-text=ebdbb2ff
selection-match=fabd2fff
border=83a598ff

[border]
width=2
radius=12
